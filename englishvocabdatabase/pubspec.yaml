name: englishvocabdatabase
description: "A new Flutter project."
publish_to: 'none'  # 不上傳至 pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI 與功能元件
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.0.0

  # Riverpod 與相關套件
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 資料序列化
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Dart 基本套件
  meta: ^1.11.0
  sqflite: ^2.4.2
  path: ^1.9.1
  file_picker: ^10.2.0
  
  # share
  receive_sharing_intent_plus:
    path: ./plugins/receive_sharing_intent_plus
  shared_preferences: ^2.2.2

  # background
  image_picker: ^1.0.4
  path_provider: ^2.0.15

  # 權限
  android_intent_plus: ^5.3.0
  package_info_plus: ^8.3.0

dev_dependencies:
  # Flutter 測試與 lint
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.15

  # 程式碼產生工具
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.5.8
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true